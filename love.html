<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background"></div>
<div class="container">
<section class="hero">
    <h1 id="nomes">
        Carregando...
    </h1>
    <p>
        Nosso tempo juntos ❤️
    </p>
    <div class="contador">
        <div class="box-tempo">
            <h3 id="dias">0</h3>
            <span>Dias</span>
        </div>
        <div class="box-tempo">
            <h3 id="horas">0</h3>
            <span>Horas</span>
        </div>
        <div class="box-tempo">
            <h3 id="minutos">0</h3>
            <span>Minutos</span>
        </div>
        <div class="box-tempo">
            <h3 id="segundos">0</h3>
            <span>Segundos</span>
        </div>
    </div>
</section>
<div class="card">
    <h2>💌 Nossa Carta</h2>
    <p class="carta" id="mensagem">
        Carregando...
    </p>
</div>
<div class="card">
    <h2>🎵 Nossa Música</h2>
    <div id="musica"></div>
</div>
<div class="card">
    <h2>📸 Nossas Fotos</h2>
    <div
    class="galeria"
    id="galeria">
    </div>
</div>
</div>
<script type="module" src="love.js"></script>
</body>
</html>
